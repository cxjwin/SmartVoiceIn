  <!-- Sound wave arcs - 3 layers radiating from center dot -->
  <path d="M 490 380 A 160 160 0 0 1 490 644"
        fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round"/>
  <path d="M 555 295 A 260 260 0 0 1 555 729"
        fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round"/>
  <path d="M 620 218 A 355 355 0 0 1 620 806"
        fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round"/>
</svg>
